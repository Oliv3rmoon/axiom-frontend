<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM Cognitive Observer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #00ff41;
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: grid;
            grid-template-rows: auto 1fr;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        header {
            text-align: center;
            border-bottom: 2px solid #00ff41;
            padding-bottom: 15px;
        }

        h1 {
            font-size: 2em;
            text-shadow: 0 0 10px #00ff41;
            margin-bottom: 10px;
        }

        .status {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 0.9em;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4400;
            box-shadow: 0 0 10px currentColor;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: #00ff41;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            overflow: hidden;
        }

        .panel {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid #00ff41;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            font-size: 1.2em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
            padding-bottom: 8px;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .panel-content::-webkit-scrollbar {
            width: 8px;
        }

        .panel-content::-webkit-scrollbar-track {
            background: rgba(0, 255, 65, 0.1);
        }

        .panel-content::-webkit-scrollbar-thumb {
            background: #00ff41;
            border-radius: 4px;
        }

        .pipeline-viz {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 10px;
        }

        .pipeline-stage {
            position: relative;
            padding: 15px;
            background: rgba(0, 255, 65, 0.1);
            border-left: 3px solid #00ff41;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .pipeline-stage.active {
            background: rgba(0, 255, 65, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
            transform: translateX(5px);
        }

        .pipeline-stage.complete {
            opacity: 0.6;
            border-left-color: rgba(0, 255, 65, 0.4);
        }

        .stage-title {
            font-weight: bold;
            font-size: 0.95em;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stage-timestamp {
            font-size: 0.75em;
            opacity: 0.7;
        }

        .stage-content {
            font-size: 0.85em;
            line-height: 1.4;
            margin-top: 8px;
            padding-left: 10px;
            opacity: 0.9;
        }

        .event-stream {
            display: flex;
            flex-direction: column-reverse;
            gap: 10px;
        }

        .event-item {
            padding: 10px;
            background: rgba(0, 255, 65, 0.08);
            border-radius: 4px;
            font-size: 0.85em;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .event-type {
            color: #ffaa00;
            font-weight: bold;
            margin-right: 8px;
        }

        .event-time {
            color: #888;
            font-size: 0.8em;
            float: right;
        }
